<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0b1220;
            color: #e6eef2;
            margin: 0;
        }

        .box {
            text-align: center;
            max-width: 680px;
            padding: 24px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
        }

        a {
            color: #00b14f;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Offline</h1>
        <p>Unable to reach the requested page. Please check network connectivity.</p>
        <p>If this is a local intranet page, ensure the machine has access to those resources.</p>
    </div>
</body>
</html>
